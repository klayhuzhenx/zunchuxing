<body class="flex flex-col min-h-screen">\
<!-- Header Section (Brand Identity) -->\

</header>\
<!-- Main Content (Login Form) -->\
<main class="flex-grow px-container-margin">\
<div class="space-y-stack-md"><div class="flex border-b border-outline-variant mb-6"><button class="flex-1 pb-3 text-body-lg font-semibold border-b-2 border-primary text-primary transition-colors" id="tab-sms">密 码 登 录 </button><button class="flex-1 pb-3 text-body-lg font-normal border-b-2 border-transparent text-on-surface-variant hover:text-primary transition-colors" id="tab-password">密 码 登 录 </button></div>\
<!-- Mobile Input -->\
<div class="relative"><input class="w-full h-14 bg-slate-surface rounded-[24px] border-none px-6 pr-32 font-body-lg text-body-lg focus:ring-1.5 focus:ring-primary placeholder:text-on-secondary-container transition-all" placeholder="请 输 入 手 机 号 " type="text"></div>\
<!-- Password Input -->\
<div class="relative">\
<input class="w-full h-14 bg-slate-surface rounded-[24px] border-none px-6 pr-14 font-body-lg text-body-lg focus:ring-1.5 focus:ring-primary placeholder:text-on-secondary-container transition-all" id="password-input" placeholder="请 输 入 密 码 " type="password">\
<button class="absolute right-5 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-primary transition-colors" onclick="togglePassword()">\
<span class="material-symbols-outlined" id="password-toggle-icon">visibility</span>\
</button>\
</div>\
<!-- Agreement Checkbox -->\
<div class="flex items-start gap-3 py-2 px-1">\
<label class="relative flex items-center cursor-pointer">\
<input class="sr-only custom-checkbox" type="checkbox">\
<div class="checkbox-mark w-5 h-5 rounded-full border border-outline-variant flex items-center justify-center transition-all duration-200"></div>\
</label>\
<p class="font-label-md text-label-md text-on-surface-variant leading-tight">\
我 已 阅 读 并 同 意 <span class="text-primary font-semibold">《 用 户 服 务 协 议 》 </span> 和 <span class="text-primary font-semibold">《 隐 私 政 策 》 </span>\
</p>\
</div>\
<!-- Actions -->\
<div class="space-y-gutter-md pt-stack-sm">\

<script>\
function togglePassword() \
const passwordInput = document.getElementById('password-input');\
const icon = document.getElementById('password-toggle-icon');\
if (passwordInput.type === 'password') \
passwordInput.type = 'text';\
icon.innerText = 'visibility_off';\
else \
passwordInput.type = 'password';\
icon.innerText = 'visibility';\
\
\
\
// Simple haptic-like interaction for buttons\
const buttons = document.querySelectorAll('button');\
buttons.forEach(btn => \
btn.addEventListener('touchstart', () => \
btn.style.transform = 'scale(0.98)';\
);\
btn.addEventListener('touchend', () => \
btn.style.transform = 'scale(1)';\
);\
);\
</script>\
