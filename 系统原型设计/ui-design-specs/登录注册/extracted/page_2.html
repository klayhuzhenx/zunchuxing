<style>\
.material-symbols-outlined \
font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;\
display: inline-block;\
vertical-align: middle;\
\
body \
background-color: #f9f9f9;\
font-family: 'Hanken Grotesk', sans-serif;\
-webkit-tap-highlight-color: transparent;\
\
input:focus \
outline: none;\
border-color: #000000 !important;\
\
.ios-blur \
backdrop-filter: blur(20px);\
-webkit-backdrop-filter: blur(20px);\
\

<body class="flex flex-col min-h-screen">\
<!-- TopAppBar (Transactional: Back + Title) -->\
<header class="w-full top-0 sticky z-50 bg-surface dark:bg-obsidian-deep flex items-center justify-between px-container-margin h-14">\
<div class="flex items-center gap-2 cursor-pointer opacity-80 duration-200" onclick="history.back()">\
<span class="material-symbols-outlined text-primary dark:text-primary-fixed">arrow_back</span>\
</div>\
<div class="absolute left-1/2 -translate-x-1/2 font-headline-md text-headline-md-mobile font-bold text-primary dark:text-on-primary-fixed">\
重 置 密 码 \
</div>\
<div class="w-6"></div> <!-- Spacer for symmetry -->\
</header>\
<!-- Main Canvas -->\
<main class="flex-grow px-container-margin pt-stack-xl pb-10">\
<!-- Brand Moment -->\
<div class="mb-stack-xl flex flex-col items-start">\
<h1 class="font-display-lg-mobile text-display-lg-mobile text-primary mb-2">找 回 您 的 账 号 </h1>\
<p class="font-body-md text-body-md text-on-secondary-container">请 验 证 您 的 手 机 号 以 设 置 新 密 码 </p>\
</div>\
<!-- Form Section -->\
<form class="space-y-stack-lg" id="resetForm">\
<!-- Mobile Number Input -->\
<div class="space-y-stack-sm">\
<label class="font-label-md text-label-md text-on-surface ml-1">手 机 号 码 </label>\
<div class="relative">\
<input class="w-full h-14 bg-slate-surface border-none rounded-[24px] px-6 font-body-lg text-body-lg placeholder:text-on-primary-container transition-all" maxlength="11" placeholder="请 输 入 您 的 手 机 号 " type="tel">\
</div>\
</div>\
<!-- Verification Code Input -->\
<div class="space-y-stack-sm">\
<label class="font-label-md text-label-md text-on-surface ml-1">验 证 码 </label>\
<div class="flex gap-3">\
<div class="relative flex-grow">\
<input class="w-full h-14 bg-slate-surface border-none rounded-[24px] px-6 font-body-lg text-body-lg placeholder:text-on-primary-container transition-all" maxlength="6" placeholder="6位 验 证 码 " type="number">\
</div>\
<button class="h-14 px-6 bg-slate-surface text-primary font-label-md text-label-md rounded-[24px] active:scale-95 transition-transform whitespace-nowrap" id="getCodeBtn" type="button">\
获 取 验 证 码 \
</button>\
</div>\
</div>\
<!-- New Password Input -->\
<div class="space-y-stack-sm">\
<label class="font-label-md text-label-md text-on-surface ml-1">新 密 码 </label>\
<div class="relative group">\
<input class="w-full h-14 bg-slate-surface border-none rounded-[24px] px-6 font-body-lg text-body-lg placeholder:text-on-primary-container transition-all" id="passwordInput" placeholder="请 输 入 新 密 码 (至 少 8位 )" type="password">\
<button class="absolute right-5 top-1/2 -translate-y-1/2 text-on-secondary-container" onclick="togglePassword()" type="button">\
<span class="material-symbols-outlined" id="eyeIcon">visibility_off</span>\
</button>\
</div>\
</div>\
<!-- Submit Button -->\
<div class="pt-stack-md">\
<button class="w-full h-14 bg-primary text-on-primary font-headline-sm text-headline-sm rounded-[24px] shadow-[0px_10px_40px_rgba(0,0,0,0.04)] active:opacity-80 transition-all" type="submit">\
确 认 提 交 \
</button>\
</div>\
</form>\
<!-- Secondary Guidance -->\
<div class="mt-stack-xl flex flex-col items-center gap-stack-sm">\
<p class="font-label-md text-label-md text-on-secondary-container">遇 到 问 题 ？ </p>\
<button class="font-label-md text-label-md text-premium-blue font-bold">联 系 尊 出 行 管 家 </button>\
</div>\
</main>\
<!-- Visual Polish: Background Graphic -->\
<div class="fixed -bottom-20 -right-20 w-64 h-64 opacity-5 pointer-events-none">\
<div class="w-full h-full rounded-full border-[32px] border-primary"></div>\
</div>\
<!-- Scripts for Micro-interactions -->\
<script>\
function togglePassword() \
const input = document.getElementById('passwordInput');\
const icon = document.getElementById('eyeIcon');\
if (input.type === 'password') \
input.type = 'text';\
icon.textContent = 'visibility';\
else \
input.type = 'password';\
icon.textContent = 'visibility_off';\
\
\
\
const getCodeBtn = document.getElementById('getCodeBtn');\
let countdown = 0;\
\
getCodeBtn.addEventListener('click', () => \
if (countdown > 0) return;\
\
// Simulating code request\
countdown = 60;\
getCodeBtn.classList.add('opacity-50');\
\
const timer = setInterval(() => \
countdown--;\
if (countdown <= 0) \
clearInterval(timer);\
getCodeBtn.textContent = '重 新 获 取 ';\
getCodeBtn.classList.remove('opacity-50');\
else \
getCodeBtn.textContent = `$countdowns 后 重 试 `;\
\
, 1000);\
);\
\
document.getElementById('resetForm').addEventListener('submit', (e) => \
e.preventDefault();\
// Add haptic feedback simulation or navigation logic here\
console.log('Reset form submitted');\
);\
</script>\
</body></html>\
