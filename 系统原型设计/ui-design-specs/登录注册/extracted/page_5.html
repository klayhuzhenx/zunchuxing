<!DOCTYPE html><html lang="zh-CN"><head>\
<meta charset="utf-8">\
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" name="viewport">\

tailwind.config = \

,\
"borderRadius": \

"full": "9999px"\
,\
"spacing": \
"stack-xl": "48px",\

,\

"label-sm": ["11px", "lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "500"],\

\

</script>\
<style>\
body \
background-color: #f9f9f9;\
color: #1a1c1c;\
-webkit-font-smoothing: antialiased;\
overflow-x: hidden;\
\
.material-symbols-outlined \
font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;\
\
.custom-checkbox:checked + label .check-box \
background-color: #000000;\
border-color: #000000;\
\
.custom-checkbox:checked + label .check-icon \
opacity: 1;\
\
</style>\
</head>\
<body class="flex flex-col min-h-screen">\
<!-- TopAppBar -->\
<header class="w-full top-0 sticky bg-surface dark:bg-obsidian-deep z-50">\
<div class="flex items-center justify-between px-container-margin h-14 w-full">\
<div class="flex items-center gap-4">\
<button class="opacity-80 transition-opacity active:opacity-80 duration-200" onclick="history.back()">\
<span class="material-symbols-outlined text-primary dark:text-primary-fixed">arrow_back</span>\
</button>\
<h1 class="font-headline-md text-headline-md-mobile font-bold text-primary dark:text-on-primary-fixed">注 册 账 号 </h1>\
</div>\
<div class="w-10"></div> <!-- Placeholder for centering balance if needed -->\
</div>\
</header>\
<main class="flex-grow px-container-margin pt-stack-xl flex flex-col">\
<!-- Brand Moment -->\
<div class="mb-stack-xl text-center md:text-left">\
<h2 class="font-display-lg-mobile text-display-lg-mobile text-primary mb-2">加 入 尊 出 行 </h2>\
<p class="font-body-md text-body-md text-secondary">开 启 您 的 专 属 高 端 旅 程 </p>\
</div>\
<!-- Registration Form -->\
<div class="space-y-stack-md">\
<!-- Phone Input -->\
<div class="relative">\
<input class="w-full h-14 bg-slate-surface rounded-[24px] border-none px-6 font-body-lg text-body-lg focus:ring-1.5 focus:ring-primary transition-all placeholder:text-on-surface-variant" placeholder="手 机 号 " type="tel">\
</div>\
<!-- Verification Code Row -->\
<div class="flex gap-gutter-md">\
<div class="flex-grow relative">\
<input class="w-full h-14 bg-slate-surface rounded-[24px] border-none px-6 font-body-lg text-body-lg focus:ring-1.5 focus:ring-primary transition-all placeholder:text-on-surface-variant" placeholder="验 证 码 " type="number">\
</div>\
<button class="px-6 h-14 bg-surface-container-highest rounded-[24px] font-label-md text-label-md text-primary active:scale-95 transition-transform duration-200" id="get-code">\
获 取 验 证 码 \
</button>\
</div>\
<!-- Password Input -->\
<div class="relative">\
<input class="w-full h-14 bg-slate-surface rounded-[24px] border-none px-6 font-body-lg text-body-lg focus:ring-1.5 focus:ring-primary transition-all placeholder:text-on-surface-variant" id="password-input" placeholder="设 置 密 码 " type="password">\
<button class="absolute right-6 top-1/2 -translate-y-1/2 text-secondary" onclick="togglePassword()" type="button">\
<span class="material-symbols-outlined" id="password-toggle-icon">visibility</span>\
</button>\
</div>\
<!-- Protocol Agreement -->\
<div class="flex items-start gap-3 py-2">\
<input class="hidden custom-checkbox" id="agreement" type="checkbox">\
<label class="flex items-start cursor-pointer group" for="agreement">\
<div class="check-box w-5 h-5 rounded-full border-2 border-outline-variant flex items-center justify-center mt-1 transition-colors">\
<span class="material-symbols-outlined check-icon text-[14px] text-white opacity-0 transition-opacity" style="font-variation-settings: 'FILL' 1;">check</span>\
</div>\
<p class="ml-3 font-label-md text-label-md text-secondary leading-relaxed">\
我 已 阅 读 并 同 意 <span class="text-premium-blue">《 用 户 服 务 协 议 》 </span> 与 <span class="text-premium-blue">《 隐 私 权 政 策 》 </span>\
</p>\
</label>\
</div>\
</div>\
<!-- Submit Button -->\
<div class="mt-stack-lg">\
<button class="w-full h-14 bg-primary text-on-primary rounded-[24px] font-headline-sm text-headline-sm active:opacity-80 transition-opacity">\
注 册 \
</button>\
</div>\
<!-- Footer Link -->\
<div class="mt-8 text-center">\
<p class="font-body-md text-body-md text-secondary">\
已 有 账 号 ？ <a class="text-primary font-bold" href="/login">去 登 录 </a>\
</p>\
</div>\
</main>\
<!-- Decorative Atmosphere (Bottom) -->\
<div class="fixed bottom-0 left-0 w-full h-1/4 pointer-events-none -z-10 opacity-30 overflow-hidden">\
<div class="absolute bottom-0 w-full h-full bg-gradient-to-t from-surface-container-highest to-transparent"></div>\
</div>\
<script>\
function togglePassword() \
const input = document.getElementById('password-input');\
const icon = document.getElementById('password-toggle-icon');\
if (input.type === 'password') \
input.type = 'text';\
icon.textContent = 'visibility_off';\
else \
input.type = 'password';\
icon.textContent = 'visibility';\
\
\
\
const getCodeBtn = document.getElementById('get-code');\
getCodeBtn.addEventListener('click', function() \
let timeLeft = 60;\
this.disabled = true;\
this.classList.add('opacity-50');\
\
const timer = setInterval(() => \
if (timeLeft <= 0) \
clearInterval(timer);\
this.textContent = '重 新 获 取 ';\
this.disabled = false;\
this.classList.remove('opacity-50');\
else \
this.textContent = `$timeLefts 后 重 试 `;\
timeLeft--;\
\
, 1000);\
);\
</script>\
</body></html>\
\
